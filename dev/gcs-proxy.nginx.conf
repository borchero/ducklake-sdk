# Reverse proxy that makes rustfs (S3) usable as a GCS endpoint for object_store.
#
# object_store's GCS backend always sends an empty `Authorization: Bearer `
# header, which rustfs (built on the `s3s` framework) rejects because any
# present Authorization header must be valid AWS SigV4. We strip the header here
# so requests reach rustfs as anonymous, which it accepts on a public bucket.
# rustfs fully implements the S3/GCS XML multipart upload API that object_store
# uses for writes, which no GCS emulator currently provides.

server {
    listen 4443;
    server_name _;

    # Parquet uploads can be large; do not cap the request body size.
    client_max_body_size 0;

    location / {
        proxy_pass http://rustfs:9000;
        proxy_http_version 1.1;

        # Drop the empty Bearer token so the request is treated as anonymous.
        proxy_set_header Authorization "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
