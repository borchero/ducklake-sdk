name: Build
on:
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------- RUST ------------------------------------------- #

  publish-rs:
    name: ${{ case(github.event_name == 'release', 'Publish Rust', 'Publish Rust (dry-run)') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: crates-io
      deployment: false
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # for versioning
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          environments: build
          activate-environment: true
      - name: Authenticate with crates.io
        id: auth
        if: github.event_name == 'release'
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
      - name: Install Rust
        run: rustup show
      - name: Set version
        run: git ls-files '**Cargo.toml' | xargs sed -i "s/0.0.0/$(pixi run get-version)/"
      - name: Publish crate ${{ case(github.event_name != 'release', '(dry-run)', '') }}
        run: cargo publish ${{ case(github.event_name != 'release', '--dry-run', '') }} --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # ------------------------------------------- PYTHON ------------------------------------------ #

  build-py-sdist:
    name: Build Python sdist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # for versioning
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          environments: build
          activate-environment: true
      - name: Set version
        run: |
          VERSION=$(pixi run get-version)
          sed -i "s/0.0.0/$VERSION/" ducklake-python/pyproject.toml
          git ls-files '**Cargo.toml' | xargs sed -i "s/0.0.0/$VERSION/"
      - name: Build project
        run: pixi run build-py-sdist
      - name: Upload package
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: py-sdist
          path: ducklake-python/dist/*

  build-py-wheel:
    name: Build Python wheel (${{ matrix.target-platform }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target-platform: linux-64
            os: ubuntu-latest
          - target-platform: linux-aarch64
            os: ubuntu-24.04-arm
          - target-platform: osx-64
            os: macos-26-intel
          - target-platform: osx-arm64
            os: macos-latest
          - target-platform: win-64
            os: windows-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # for versioning
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          environments: build
          activate-environment: true
      - name: Set version
        run: |
          VERSION=$(pixi run get-version)
          sed -i "s/0.0.0/$VERSION/" ducklake-python/pyproject.toml
          git ls-files '**Cargo.toml' | xargs sed -i "s/0.0.0/$VERSION/"
        shell: bash
      - name: Build wheel
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          command: build
          args: --out dist --release -i python3.10 -m ducklake-python/Cargo.toml
          manylinux: auto
          sccache: true
      - name: Check package
        run: pixi run twine check dist/*
      - name: Upload package
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: py-wheel-${{ matrix.target-platform }}
          path: dist/*

  publish-py:
    name: Publish Python
    if: github.event_name == 'release'
    needs: build-py-wheel
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      deployment: false
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Publish package on PyPi
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
