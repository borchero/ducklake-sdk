name: Build
on:
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------- RUST ------------------------------------------- #

  publish-rs:
    name: ${{ case(github.event_name == 'release', 'Publish Rust', 'Publish Rust (dry-run)') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: crates-io
      deployment: false
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # for versioning
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: build
          activate-environment: true
      - name: Authenticate with crates.io
        id: auth
        if: github.event_name == 'release'
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
      - name: Install Rust
        run: rustup show
      - name: Set version
        run: git ls-files '**Cargo.toml' | xargs sed -i "s/0.0.0/$(pixi run get-version)/"
      - name: Publish crate ${{ case(github.event_name != 'release', '(dry-run)', '') }}
        run: cargo publish ${{ case(github.event_name != 'release', '--dry-run', '') }} --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # ------------------------------------------- PYTHON ------------------------------------------ #

  build-py-sdist:
    name: Build Python sdist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # for versioning
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: build
          activate-environment: true
      - name: Set version
        run: |
          VERSION=$(pixi run get-version)
          sed -i "s/0.0.0/$VERSION/" ducklake-python/pyproject.toml
          git ls-files '**Cargo.toml' | xargs sed -i "s/0.0.0/$VERSION/"
      - name: Build project
        run: pixi run build-py-sdist
      - name: Upload package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: py-sdist
          path: ducklake-python/dist/*

  build-py-wheel:
    name: Build Python wheel (${{ matrix.target-platform }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target-platform: linux-64
            os: ubuntu-latest
          - target-platform: linux-aarch64
            os: ubuntu-24.04-arm
          - target-platform: osx-64
            os: macos-26-intel
          - target-platform: osx-arm64
            os: macos-latest
          - target-platform: win-64
            os: windows-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # for versioning
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: build
          activate-environment: true
      - name: Set version
        run: |
          VERSION=$(pixi run get-version)
          sed -i "s/0.0.0/$VERSION/" ducklake-python/pyproject.toml
          git ls-files '**Cargo.toml' | xargs sed -i "s/0.0.0/$VERSION/"
        shell: bash
      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: build
          args: --out dist --release -i python3.10 -m ducklake-python/Cargo.toml
          manylinux: auto
          sccache: true
      - name: Check package
        run: pixi run twine check dist/*
      - name: Upload package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: py-wheel-${{ matrix.target-platform }}
          path: dist/*

  publish-py:
    name: Publish Python
    if: github.event_name == 'release'
    needs: build-py-wheel
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      deployment: false
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Publish package on PyPi
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
