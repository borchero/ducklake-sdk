name: CI
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
      - name: Install Rust
        run: rustup show
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install Python package
        run: pixi run install-py
      - name: Run linting
        run: pixi run lint

  # -------------------------------------------- RUST ------------------------------------------- #

  unit-tests-rs:
    name: Unit Tests (Rust)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: test-rs
          activate-environment: true
      - name: Install Rust
        run: rustup show
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run tests
        run: pixi run test-rs-coverage --locked --output-path coverage-rs.lcov
      - name: Upload coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: coverage-rs.lcov
          use_oidc: true

  # ------------------------------------------- PYTHON ------------------------------------------ #

  unit-tests-py:
    name: |
      Unit Tests (${{ matrix.python-version }} - ${{ matrix.database }} - ${{ matrix.storage }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        python-version: [py314]
        database: [sqlite, postgres, mysql]
        storage: [local, s3, gcs, azure]
        include:
          - python-version: py313
            database: sqlite
            storage: local
          - python-version: py312
            database: sqlite
            storage: local
          - python-version: py311
            database: sqlite
            storage: local
          - python-version: py310
            database: sqlite
            storage: local
    services:
      postgres:
        image: ${{ case(matrix.database == 'postgres', 'postgres:latest', '') }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
      mysql:
        image: ${{ case(matrix.database == 'mysql', 'mysql:latest', '') }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mysql
        ports:
          - "3306:3306"
      rustfs:
        image: ${{ case(matrix.storage == 's3' || matrix.storage == 'gcs', 'rustfs/rustfs:latest', '') }}
        env:
          RUSTFS_ADDRESS: ":9000"
          RUSTFS_ACCESS_KEY: rustfsadmin
          RUSTFS_SECRET_KEY: rustfsadmin
        ports:
          - "9000:9000"
      azurite:
        image: ${{ case(matrix.storage == 'azure', 'mcr.microsoft.com/azure-storage/azurite:latest', '') }}
        command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --skipApiVersionCheck
        ports:
          - "10000:10000"
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: test-${{ matrix.python-version }}
          activate-environment: true
      - name: Install Rust
        run: rustup show
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Set env variables for Rust coverage
        run: echo "$(cargo llvm-cov show-env | tr -d "'")" >> $GITHUB_ENV
      - name: Set up workspace for Rust coverage
        run: cargo llvm-cov clean --workspace
      - name: Install Python package
        run: pixi run install-py
      - name: Start GCS proxy (nginx in front of rustfs)
        if: matrix.storage == 'gcs'
        run: |
          docker run -d --name gcs-proxy --network host \
            --add-host rustfs:127.0.0.1 \
            -v ./dev/gcs-proxy.nginx.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:latest
      - name: Run tests with coverage
        run: pixi run test-py-coverage -v --catalog ${{ matrix.database }} --storage ${{ matrix.storage }}
        env:
          AWS_ENDPOINT_URL: http://localhost:9000
          AWS_ACCESS_KEY_ID: rustfsadmin
          AWS_SECRET_ACCESS_KEY: rustfsadmin
          STORAGE_EMULATOR_HOST: http://localhost:4443
          GOOGLE_SERVICE_ACCOUNT_KEY:
            '{"gcs_base_url": "http://localhost:4443", "disable_oauth": true, "client_email": "", "private_key_id": "",
            "private_key": ""}'
          AZURE_STORAGE_ACCOUNT_NAME: devstoreaccount1
          AZURE_STORAGE_ACCOUNT_KEY: Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==
          AZURE_STORAGE_ENDPOINT: http://localhost:10000
      - name: Collect Rust coverage
        run: cargo llvm-cov report -p ducklake -p ducklake-python --lcov --output-path coverage-rs.lcov
      - name: Upload coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: coverage-py.xml, coverage-rs.lcov
          use_oidc: true

  unit-tests-py-minimal:
    name: Unit Tests (py314 - sqlite - local - Minimal Dependencies)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: test-py314-minimal
          activate-environment: true
      - name: Install Rust
        run: rustup show
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install Python package
        run: pixi run install-py
      - name: Run tests
        run: pixi run pytest -v tests/unit/test_minimal.py

  unit-tests-py-release:
    name: Unit Tests (py314 - sqlite - local - Release Build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: test-py314
          activate-environment: true
      - name: Install Rust
        run: rustup show
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install Python package
        run: pixi run install-py --release
      - name: Run tests
        run: pixi run test-py -v
