services:
  # ----------------------------------------- DATABASES ----------------------------------------- #

  postgres:
    image: postgres:latest
    command: postgres -c log_statement=all
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  mysql:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mysql
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # -------------------------------------- STORAGE BACKENDS ------------------------------------- #

  rustfs:
    image: rustfs/rustfs:latest
    command: /data
    environment:
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ADDRESS: ":9001"
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data

  # GCS is emulated by proxying to rustfs (S3). No GCS emulator implements the
  # S3-style XML multipart upload API that object_store uses for `gs://` writes,
  # but rustfs does. The nginx proxy strips the empty `Authorization: Bearer `
  # header object_store sends so rustfs accepts the request anonymously.
  gcs:
    image: nginx:latest
    depends_on:
      - rustfs
    ports:
      - "4443:4443"
    volumes:
      - ./dev/gcs-proxy.nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # azurite

volumes:
  postgres_data:
  mysql_data:
  rustfs_data:
